<!DOCTYPE html>
<html>
<head>
<style>
body {
    font-size: 16px;
}

h1 {
    font-size: 36px;
}

h2 {
    font-size: 2rem;
}

p {
    font-size: 18px;
}

.small {
    font-size: 12px;
}
</style>
</head>
<body>

<h1>Main Heading</h1>
<h2>Sub Heading</h2>
<p>This paragraph has a font size of 18px.</p>
<p class="small">This is smaller text.</p>

</body>
</html>
