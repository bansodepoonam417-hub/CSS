<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    font-weight: bold;
}

h2 {
    font-weight: 700;
}

p {
    font-weight: normal;
}

.light {
    font-weight: 300;
}
</style>
</head>
<body>

<h1>Bold Heading</h1>
<h2>Bold Heading (700)</h2>
<p>Normal paragraph text.</p>
<p class="light">Light weight text.</p>

</body>
</html>
