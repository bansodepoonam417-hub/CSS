<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    text-align: center;
}

h2 {
    text-align: right;
}

p {
    text-align: justify;
}
</style>
</head>
<body>

<h1>Centered Heading</h1>
<h2>Right Aligned Heading</h2>

<p>
This paragraph is justified. The text is aligned evenly along both the left and right margins, giving it a clean appearance.
</p>

</body>
</html>
