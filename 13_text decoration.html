<!DOCTYPE html>
<html>
<head>
<style>
h1 {
    text-decoration: underline;
}

h2 {
    text-decoration: overline;
}

p {
    text-decoration: line-through;
}

a {
    text-decoration: none;
}
</style>
</head>
<body>

<h1>Underlined Heading</h1>
<h2>Overlined Heading</h2>
<p>This text has a line through it.</p>
<a href="#">This link has no underline</a>

</body>
</html>
